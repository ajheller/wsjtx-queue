name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install black
      - run: black --check wsjtx_queue.py wsjtx_udp_hub.py tests
      - run: python -m unittest discover -s tests

  standalone:
    name: standalone-${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            queue_path: dist/wsjtx-queue.exe
            hub_path: dist/wsjtx-udp-hub.exe
          - platform: macos
            os: macos-latest
            queue_path: dist/wsjtx-queue
            hub_path: dist/wsjtx-udp-hub
          - platform: linux
            os: ubuntu-latest
            queue_path: dist/wsjtx-queue
            hub_path: dist/wsjtx-udp-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-build.txt
      - run: python -m PyInstaller --onefile --name wsjtx-queue wsjtx_queue.py
      - run: python -m PyInstaller --onefile --name wsjtx-udp-hub wsjtx_udp_hub.py
      - name: Package Windows release asset
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package
          Copy-Item ${{ matrix.queue_path }} package/
          Copy-Item ${{ matrix.hub_path }} package/
          Copy-Item "launchers/Start WSJT-X Queue.bat" package/
          Copy-Item README.md package/
          Copy-Item LICENSE package/
          Copy-Item docs package/docs -Recurse
          Compress-Archive -Path package/* -DestinationPath wsjtx-queue-${{ github.ref_name }}-${{ matrix.platform }}.zip
      - name: Package Unix release asset
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform != 'windows'
        run: |
          mkdir package
          cp "${{ matrix.queue_path }}" package/
          cp "${{ matrix.hub_path }}" package/
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp "launchers/Start WSJT-X Queue.command" package/
          else
            cp launchers/start-wsjtx-queue.sh package/
          fi
          cp README.md LICENSE package/
          cp -R docs package/docs
          tar -czf wsjtx-queue-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz -C package .
      - uses: actions/upload-artifact@v4
        with:
          name: wsjtx-queue-${{ matrix.platform }}
          path: |
            ${{ matrix.queue_path }}
            ${{ matrix.hub_path }}
            wsjtx-queue-${{ github.ref_name }}-${{ matrix.platform }}.*
            README.md
            LICENSE
            docs/
            launchers/

  release:
    name: release
    needs: standalone
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wsjtx-queue-*
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            artifacts/wsjtx-queue-${{ github.ref_name }}-windows.zip \
            artifacts/wsjtx-queue-${{ github.ref_name }}-macos.tar.gz \
            artifacts/wsjtx-queue-${{ github.ref_name }}-linux.tar.gz \
            --title "wsjtx-queue ${{ github.ref_name }}" \
            --notes "Standalone builds for Windows, macOS, and Linux. Each archive includes wsjtx-queue, wsjtx-udp-hub, README.md, LICENSE, docs/, and a simple launcher."
