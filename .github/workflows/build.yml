name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests

  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-build.txt
      - run: pyinstaller --onefile --name wsjtx-queue wsjtx_queue.py
      - run: pyinstaller --onefile --name wsjtx-udp-hub wsjtx_udp_hub.py
      - uses: actions/upload-artifact@v4
        with:
          name: wsjtx-queue-windows
          path: |
            dist/wsjtx-queue.exe
            dist/wsjtx-udp-hub.exe
